trigger:
  branches:
    include:
    - main

schedules:
- cron: "0 0 * * *"
  displayName: Daily run
  always: true
  branches:
    include:
      - main 

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: ETL
  displayName: "Extract Transform Load"
  jobs:
  - job: ETL_Job
    steps:
    - script: pip install -r requirements.txt
      displayName: 'Install Dependencies'

    - script: python src/etl.py
      displayName: 'Run ETL Pipeline'

    - script: |
        echo "ETL Pipeline Failed! Check logs for details."
      condition: failed()
      displayName: "Failure Notification"

    - task: PublishPipelineArtifact@1
      displayName: 'Publish CSV Outputs'
      inputs:
        targetPath: 'output'
        artifact: 'csv_outputs'
        publishLocation: 'pipeline'